appId: com.kmaphouse.app
productName: DBY HOME
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asar: false
asarUnpack:
  - resources/**
extraFiles:
  - from: node_modules/electron/dist/resources.pak
    to: .
  - from: node_modules/electron/dist/v8_context_snapshot.bin
    to: .
  - from: node_modules/electron/dist/libGLESv2.dll
    to: .
  - from: node_modules/electron/dist/d3dcompiler_47.dll
    to: .
  - from: node_modules/electron/dist/chrome_200_percent.pak
    to: .
  - from: node_modules/electron/dist/vk_swiftshader.dll
    to: .
  - from: node_modules/electron/dist/version
    to: .
win:
  executableName: DBY Home
  icon: build/icon.ico
  signAndEditExecutable: true
nsis:
  artifactName: DBYHOME-${version}-setup.${ext}
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: DBY HOME
  uninstallDisplayName: DBY HOME
  createDesktopShortcut: always
  createStartMenuShortcut: true
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: generic
  url: https://github.com/yendao444-del/k-map-house/releases/latest/download/
