<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">
  <!-- Electric glow aura -->
  <ellipse cx="100" cy="82" rx="52" ry="18" fill="#039BE5" opacity="0.15"/>
  <!-- Rear wheel -->
  <circle cx="50" cy="90" r="22" fill="none" stroke="#212121" stroke-width="6"/>
  <circle cx="50" cy="90" r="9" fill="#0288D1"/>
  <circle cx="50" cy="90" r="3.5" fill="#B3E5FC"/>
  <!-- Front wheel -->
  <circle cx="152" cy="90" r="22" fill="none" stroke="#212121" stroke-width="6"/>
  <circle cx="152" cy="90" r="9" fill="#0288D1"/>
  <circle cx="152" cy="90" r="3.5" fill="#B3E5FC"/>
  <!-- Body sleek -->
  <path d="M58,90 Q58,52 90,48 L132,48 Q162,55 152,90 Z" fill="#01579B" stroke="#0288D1" stroke-width="2"/>
  <!-- Top shiny -->
  <path d="M90,48 Q110,42 132,48 L128,56 Q110,50 92,56 Z" fill="#0288D1"/>
  <!-- Step floor -->
  <rect x="88" y="74" width="40" height="9" rx="4.5" fill="#01579B"/>
  <!-- LED stripe -->
  <path d="M60,78 Q100,72 140,78" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- Headlight LED -->
  <ellipse cx="155" cy="65" rx="8" ry="5" fill="#E0F7FA" stroke="#00E5FF" stroke-width="2"/>
  <ellipse cx="155" cy="65" rx="4" ry="2.5" fill="#80DEEA"/>
  <!-- DRL bar -->
  <line x1="148" y1="60" x2="160" y2="60" stroke="#00BCD4" stroke-width="2" stroke-linecap="round"/>
  <!-- Battery indicator -->
  <rect x="86" y="60" width="28" height="8" rx="2" fill="#0D47A1" stroke="#0288D1" stroke-width="1"/>
  <rect x="88" y="62" width="20" height="4" rx="1" fill="#4CAF50"/>
  <!-- Lightning bolt badge -->
  <text x="98" y="56" font-size="10" fill="#FFEB3B" font-weight="bold" text-anchor="middle">⚡</text>
  <!-- Handlebar -->
  <line x1="132" y1="46" x2="144" y2="37" stroke="#37474F" stroke-width="4" stroke-linecap="round"/>
  <!-- Exhaust - none for electric, but show motor symbol -->
  <circle cx="50" cy="90" r="14" fill="none" stroke="#0288D1" stroke-width="1.5" stroke-dasharray="3 3"/>
</svg>
